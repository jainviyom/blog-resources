name: Deploy TrustCast to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "CRM Custom App/trustcast-app/**"
      - ".github/workflows/deploy-trustcast-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: CRM Custom App/trustcast-app
        run: npm install

      - name: Build static client
        working-directory: CRM Custom App/trustcast-app
        run: npm run build -w client
        env:
          VITE_STATIC: "true"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "CRM Custom App/trustcast-app/client/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
